name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment. Don't cancel in-progress runs: aborting a
# mid-flight Pages deploy can leave a partially-uploaded artifact live.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Parsers used only by the data-fetch step (Excel/ODS/zip sources);
      # deliberately not app dependencies.
      - name: Install data-fetch parsers
        run: npm install --no-save xlsx adm-zip

      # Fetch official statistics and bake them into src/generated/seriesData.ts.
      # Best-effort: any source that fails is skipped (bundled illustrative data
      # is used for it). The script always exits 0 by design, so no
      # continue-on-error is needed here.
      - name: Fetch live data
        run: node scripts/build-data.mjs

      - name: Build
        run: npm run build

      # SPA deep-link fallback is provided by public/404.html (Vite copies it
      # into dist/), which redirects unknown paths back into the app.

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
