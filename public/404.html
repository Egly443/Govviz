<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Govviz</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      Pages serves this file for any unknown path (e.g. /Govviz/dhsc) because no
      real file exists there. It encodes the requested route into a query string
      and redirects to the app root (/Govviz/?/dhsc); src/main.tsx decodes it
      back into the real path before the router reads the location.
      pathSegmentsToKeep = 1 keeps the /Govviz project-site segment.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
